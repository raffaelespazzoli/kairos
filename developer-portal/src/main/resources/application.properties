# Quinoa SPA integration
quarkus.quinoa.dev-server.port=5173
quarkus.quinoa.build-dir=dist
quarkus.quinoa.enable-spa-routing=true
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.node-version=22.22.0
quarkus.quinoa.ui-dir=src/main/webui

# OIDC Bearer token validation
quarkus.oidc.auth-server-url=${OIDC_SERVER_URL:http://localhost:8180/realms/portal}
quarkus.oidc.client-id=developer-portal
quarkus.oidc.application-type=service

# Portal JWT claim mapping
portal.oidc.role-claim=${OIDC_ROLE_CLAIM:role}
portal.oidc.team-claim=${OIDC_TEAM_CLAIM:team}

# Dev Services PostgreSQL
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.db-kind=postgresql

# Flyway schema management
quarkus.flyway.migrate-at-start=true

# Require authentication for all API endpoints
quarkus.http.auth.permission.api.paths=/api/v1/*
quarkus.http.auth.permission.api.policy=authenticated

# Secret Manager
portal.secrets.provider=${SECRETS_PROVIDER:vault}
portal.secrets.vault.url=${VAULT_URL:http://localhost:8200}
portal.secrets.vault.credential-path-template=/infra/{cluster}/kubernetes-secret-engine/creds/{role}
portal.secrets.vault.auth-role=${VAULT_AUTH_ROLE:portal}
portal.secrets.vault.auth-mount-path=${VAULT_AUTH_MOUNT_PATH:auth/kubernetes}

# Git Provider
portal.git.provider=${GIT_PROVIDER:github}
portal.git.token=${GIT_TOKEN:}
portal.git.infra-repo-url=${GIT_INFRA_REPO_URL:}
portal.git.api-url=${GIT_API_URL:}

# ── Dev profile ──────────────────────────────────────────────────────
# Disable OIDC token validation; DevAuthFilter supplies TeamContext instead
%dev.quarkus.oidc.tenant-enabled=false
%dev.quarkus.http.auth.permission.api.policy=permit
%dev.portal.secrets.provider=dev
%dev.portal.git.provider=dev

# Health
quarkus.smallrye-health.root-path=/q/health
