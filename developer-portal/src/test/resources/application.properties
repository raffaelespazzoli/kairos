# Disable OIDC tenant in tests — @TestSecurity/@OidcSecurity annotations provide mock security
quarkus.oidc.tenant-enabled=false

# Test datasource (Dev Services auto-provisions PostgreSQL)
quarkus.datasource.devservices.enabled=true
quarkus.datasource.db-kind=postgresql

# Flyway runs migrations against the test DB
quarkus.flyway.migrate-at-start=true

# Disable Quinoa for backend-only tests
quarkus.quinoa=false

# Require authentication for all API endpoints (same as main config)
quarkus.http.auth.permission.api.paths=/api/v1/*
quarkus.http.auth.permission.api.policy=authenticated

# Secret Manager — use dev provider for tests (avoids real Vault dependency)
portal.secrets.provider=dev
portal.secrets.vault.url=http://localhost:8200

# Git Provider — use dev provider for tests (avoids real Git server dependency)
portal.git.provider=dev
portal.git.token=test-token
portal.git.infra-repo-url=https://github.com/test-org/infra

# ArgoCD — use argocd provider so real adapter is testable with @InjectMock
portal.argocd.provider=argocd
portal.argocd.url=https://argocd.test.example.com
portal.argocd.token=test-argocd-token
quarkus.rest-client.argocd-api.url=${portal.argocd.url}

# Container Registry — use dev provider for tests (no real registry)
portal.registry.provider=dev
portal.registry.url=https://registry.test.example.com
portal.registry.token=test-registry-token

# Tekton — use dev provider for tests (no real cluster)
portal.tekton.provider=dev

# Deep link tool URLs for DeepLinkService tests
portal.tekton.dashboard-url=https://tekton.test.example.com
portal.grafana.url=https://grafana.test.example.com
portal.grafana.dashboard-id=test-dashboard-1
portal.devspaces.url=https://devspaces.test.example.com
portal.vault.url=https://vault.test.example.com

# Prometheus — use prometheus provider so real adapter is testable with @InjectMock
portal.prometheus.provider=prometheus
portal.prometheus.url=https://prometheus.test.example.com
portal.prometheus.query-interval=5m
portal.prometheus.thresholds.error-rate=5.0
portal.prometheus.thresholds.saturation=90.0
portal.prometheus.queries.latency-p50=test_latency_p50{namespace="{namespace}"}[{interval}]
portal.prometheus.queries.latency-p95=test_latency_p95{namespace="{namespace}"}[{interval}]
portal.prometheus.queries.latency-p99=test_latency_p99{namespace="{namespace}"}[{interval}]
portal.prometheus.queries.traffic-rate=test_traffic{namespace="{namespace}"}[{interval}]
portal.prometheus.queries.error-rate=test_errors{namespace="{namespace}"}[{interval}]
portal.prometheus.queries.saturation-cpu=test_cpu{namespace="{namespace}"}[{interval}]
portal.prometheus.queries.saturation-memory=test_memory{namespace="{namespace}"}[{interval}]
portal.prometheus.dora-queries.deployment-frequency=test_deploy_freq{application="{appName}"}[{range}]
portal.prometheus.dora-queries.lead-time=test_lead_time{application="{appName}"}[{range}]
portal.prometheus.dora-queries.change-failure-rate=test_cfr{application="{appName}"}[{range}]
portal.prometheus.dora-queries.mttr=test_mttr{application="{appName}"}[{range}]
portal.prometheus.dora-default-range=30d
portal.prometheus.dora-step-interval=1d
quarkus.rest-client.prometheus-api.url=${portal.prometheus.url}
